<!DOCTYPE html>
<html>

<head>
<meta charset="utf8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="index.css">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0BDyqvbDWf37srcfMSISWPzT1HAn9vSw",
  projectId: "clicklogs-project-adb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let totalTouchDuration = 0;
let tapCounter = 0;
let startTap = 0, endTap = 0;
let tapLogsArray = [];
let uniqueIdentifier = Date.now();
let dependentVariable = "";

let showFeedback = false;
let interfaceSequence = 1;
let interfaceVariations = 2;

window.onload = function(){
    let el = document.getElementById('tapHere');

    ["mouseup","mousedown","touchstart","touchend"].forEach(function(te) {
        el.addEventListener(te, tapityTap);
    });
}

window.saveDependentVariable = function(dVariable){
    dependentVariable = dVariable;
    document.getElementById("buttoncontainer").style.display = "none";
    document.getElementById("container").style.display = "inline-block";
}

async function syncToServer(){

    document.getElementById("counter").innerHTML = "Saving data...";

    for (let i = 0; i < tapLogsArray.length; i++) {

        let tapData = JSON.parse(tapLogsArray[i]);
        let duration = tapData.endTimestamp - tapData.startTimestamp;

        await addDoc(collection(db, "tap_logs"), {
            session_id: uniqueIdentifier.toString(),
            device: dependentVariable,
            tap_sequence: tapData.tapSequenceNumber,
            start_time: tapData.startTimestamp,
            end_time: tapData.endTimestamp,
            duration: duration,
            interface: tapData.interface
        });
    }

    document.getElementById("container").innerHTML =
        "<h2 style='color:green;'>Data saved successfully...</h2>";
}

window.tapityTap = function(tep){

    let d = new Date();
    let te = tep.type;

    switch(te){

        case "touchstart":
        case "mousedown":
            startTap = d.getTime();
        break;

        case "touchend":
        case "mouseup":

            endTap = d.getTime();
            let duration = endTap - startTap;

            if(startTap > 0 && endTap > 0){

                tapCounter++;
                totalTouchDuration += duration;

                let tap = {
                    tapSequenceNumber: tapCounter,
                    startTimestamp: startTap,
                    endTimestamp: endTap,
                    interface: showFeedback ? "feedbackshown" : "nofeedback"
                };

                tapLogsArray.push(JSON.stringify(tap));

                if(tapCounter >= 50){

                    interfaceSequence++;

                    if(interfaceSequence <= interfaceVariations){
                        document.getElementById("continue").style.display = "block";
                        document.getElementById("tapHere").style.display = "none";
                    } else {
                        document.getElementById("tapHere").style.display = "none";
                        syncToServer();
                    }
                }
            }

            startTap = 0;
            endTap = 0;
        break;
    }
}

window.startNext = function(){
    tapCounter = 0;
    totalTouchDuration = 0;
    document.getElementById("tapHere").style.display = "block";
    document.getElementById("continue").style.display = "none";

    showFeedback = !showFeedback;
}

</script>

<link href="https://fonts.googleapis.com/css?family=Open+Sans|Roboto" rel="stylesheet">

</head>

<body>

<div>
    <div id="buttoncontainer">
        <button onclick="saveDependentVariable('android')">Android</button>
        <button onclick="saveDependentVariable('pc')">PC</button>
    </div>

    <div id="container" style="display:none;">
        <div id="counter"></div>
        <button id="tapHere">
            <img src="2x/round_touch_app_white_36dp.png"/>
        </button>
        <button id="continue" onclick="startNext()" style="display:none;">Continue</button>
    </div>
</div>

</body>
</html>
